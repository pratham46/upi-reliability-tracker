<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FBF8F2" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0D1017" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="See which Indian banks actually work on UPI — and which keep failing. Built from NPCI's monthly Technical Decline data, explained in plain English." />
    <title>UPI Reliability · Which banks actually work on UPI?</title>
    <script>
      // Apply saved/system theme before first paint to avoid a flash.
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var dark = saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
