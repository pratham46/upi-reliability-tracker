name: Refresh UPI Data

on:
  schedule:
    # Run on the 5th of every month at 06:00 UTC (NPCI typically publishes by the 3rd-4th)
    - cron: '0 6 5 * *'
  workflow_dispatch:  # allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: |
          cd pipeline
          pip install -r requirements.txt

      - name: Run pipeline (demo mode if no real data)
        run: |
          cd pipeline
          # Only seed demo if no real CSV files exist yet
          if [ -z "$(ls data/*.csv 2>/dev/null)" ]; then
            echo "No real data found — generating demo data"
            python seed_demo.py
          fi
          python ingest.py
          python build_json.py

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data/banks.json web/public/data/meta.json
          git diff --cached --quiet || git commit -m "chore: refresh UPI data [$(date -u +%Y-%m-%d)]"
          git push
